# PRD Writer config for Codex
# After copying to your project, update paths below to match your layout.
# The defaults assume:  .prd/prd-workflow.md  and  .prd/opus-prd-polish.md

agent:
  name: prd-writer
  platform: codex
  mode: platform_ready

knowledge_base:
  enabled: false
  type: files   # files | none
  root_path: ""
  include_paths: []
  fallback_strategy: ask_or_continue_with_gaps

polish:
  enabled: true
  preferred_mode: fallback_model   # opus | fallback_model | none
  strict_preserve_facts: true

publish:
  save_required: true
  git_commit: false
  create_pr: false
  suggest_commit_message_when_disabled: true

paths:
  output_dir: ./docs/prd
  workflow_file: .prd/prd-workflow.md
  polish_file: .prd/opus-prd-polish.md

platform_mapping:
  codex:
    instruction_file: AGENTS.md
    context_loader: local_files_and_workspace_docs
    git_publisher: git_cli_if_repo_exists
