agent:
  name: prd-writer
  platform: openclaw
  mode: platform_ready

knowledge_base:
  enabled: false
  type: obsidian   # obsidian | files | none
  root_path: ""
  include_paths: []
  fallback_strategy: ask_or_continue_with_gaps

polish:
  enabled: true
  preferred_mode: opus   # opus | fallback_model | none
  strict_preserve_facts: true

publish:
  save_required: true
  git_commit: false
  create_pr: false
  suggest_commit_message_when_disabled: true

paths:
  output_dir: ./docs/prd
  template_dir: ./templates

platform_mapping:
  openclaw:
    instruction_file: AGENT.md
    workflow_file: platforms/openclaw/prd-workflow.md
    polish_file: platforms/openclaw/opus-prd-polish.md
    context_loader: file_tools_plus_optional_knowledge_base
    git_publisher: git_cli
