agent:
  name: prd-writer
  mode: openclaw

knowledge_base:
  enabled: true
  type: files
  root_path: ./knowledge
  include_paths:
    - ./knowledge/igaming
    - ./knowledge/products
  fallback_strategy: ask_or_continue_with_gaps

polish:
  enabled: true
  preferred_mode: opus
  strict_preserve_facts: true

publish:
  save_required: true
  git_commit: false
  create_pr: false
  suggest_commit_message_when_disabled: true

language:
  output_mode: user_or_workspace_default

paths:
  output_dir: ./outputs/prd
  template_dir: ./templates
